<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — Notelo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(124, 58, 237, 0.12);
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #7c3aed;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      color: #1f2937;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    p {
      color: #6b7280;
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 10px;
    }
    .contact {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid #f3f4f6;
      font-size: 13px;
      color: #9ca3af;
    }
    .contact a {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 500;
    }
    .contact a:hover {
      text-decoration: underline;
    }
    .badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">notelo</div>
    <span class="badge">Maintenance en cours</span>
    <span class="icon">🔧</span>
    <h1>On revient très vite !</h1>
    <p>Notelo est temporairement indisponible.<br>Nous effectuons des améliorations pour vous offrir une meilleure expérience.</p>
    <p>Merci pour votre patience.</p>
    <div class="contact">
      Une question urgente ?
      <a href="mailto:contact@notelo.eu">contact@notelo.eu</a>
    </div>
  </div>
</body>
</html>
